configuration:
  multicast_groups:
    name: Multicast Groups
    description: >-
      List of multicast group:port entries to relay (format: GROUP:PORT).
      Defaults are 224.0.0.120:43438 (HMIP-HAP discovery) and
      224.0.0.1:43439 (HMIPW-DRAP discovery). Use tcpdump to identify
      additional groups your devices may need.
  source_interface:
    name: Source Interface
    description: >-
      The physical network interface where HMIPW-DRAP / HMIP-HAP multicast
      traffic arrives. Leave empty for auto-detection (interface with
      default route).
  target_interface:
    name: Target Interface
    description: >-
      The Docker bridge interface where OpenCCU runs. Leave empty for
      auto-detection (tries 'hassio' then 'docker0').
  log_level:
    name: Log Level
    description: >-
      Log verbosity. Set to 'debug' to see individual relayed packets
      and interface detection details.
